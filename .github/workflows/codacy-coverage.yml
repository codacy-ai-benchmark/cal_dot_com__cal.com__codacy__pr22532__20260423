name: Codacy Coverage
on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: YARN_ENABLE_IMMUTABLE_INSTALLS=false yarn install

      - name: Run tests with coverage
        run: yarn test --coverage --coverageReporters=lcov --passWithNoTests
        continue-on-error: true

      - name: Collect LCOV reports
        id: lcov
        run: |
          reports=$(find . -path '*/coverage/lcov.info' -type f | paste -sd, -)
          echo "reports=$reports" >> "$GITHUB_OUTPUT"

      - name: Upload coverage to Codacy
        uses: codacy/codacy-coverage-reporter-action@v1
        if: ${{ steps.lcov.outputs.reports != '' }}
        with:
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          coverage-reports: ${{ steps.lcov.outputs.reports }}
